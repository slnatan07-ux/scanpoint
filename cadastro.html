<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro - Scan Points</title>
<style>
body{ font-family: Arial, sans-serif; background:#f5f5f5; display:flex; justify-content:center; align-items:center; height:100vh; }
.card{ background:white; padding:30px; border-radius:10px; width:350px; box-shadow:0 0 10px rgba(0,0,0,0.2); }
input{ width:100%; padding:10px; margin:5px 0 15px; border:1px solid #ccc; border-radius:5px; }
button{ width:100%; padding:12px; background:#28a745; color:white; border:none; border-radius:5px; cursor:pointer; }
button:hover{ background:#218838; }
</style>
</head>
<body>

<div class="card">
    <h2>Cadastro de Cliente</h2>
    <input type="text" id="nome" placeholder="Nome Completo">
    <input type="text" id="cpf" placeholder="CPF">
    <input type="text" id="telefone" placeholder="Telefone">
    <input type="password" id="senha" placeholder="Senha">
    <button onclick="cadastrar()">Cadastrar</button>
</div>

<script>
async function cadastrar() {
    // 1. Pegando os valores
    const nome = document.getElementById("nome").value.trim();
    const cpf = document.getElementById("cpf").value.trim();
    const telefone = document.getElementById("telefone").value.trim();
    const senha = document.getElementById("senha").value.trim();

    // 2. Validação simples no frontend antes de enviar
    if (!nome || !cpf || !senha) {
        alert("Por favor, preencha o Nome, CPF e Senha.");
        return;
    }

    const dados = { nome, cpf, telefone, senha };

    try {
        // 3. Forçando a URL absoluta para evitar erro de CORS ou file:///
        const resposta = await fetch("cadastro", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(dados)
        });

        const resultado = await resposta.json();
        console.log("RESPOSTA DO SERVIDOR:", resultado);

        // O alerta estranho que exibia o JSON foi removido daqui!

        if (resposta.ok) {
            alert("Cadastro realizado com sucesso!");
            
            // Salva os dados de sessão
            localStorage.setItem("usuarioCadastrado", "true");
            localStorage.setItem("usuarioId", resultado.id);

            // 4. Redireciona de forma segura para o index via servidor
            window.location.href = "index.html";
        } else {
            // Exibe o erro real vindo do backend (ex: "CPF já cadastrado")
            alert(resultado.erro || "Erro ao tentar cadastrar. Tente novamente.");
        }

    } catch (e) {
        console.error("ERRO FRONT:", e);
        alert("Erro de conexão. Verifique se o servidor Node.js (localhost:3000) está rodando e o banco de dados está ativo.");
    }
}
</script>
</body>
</html>
